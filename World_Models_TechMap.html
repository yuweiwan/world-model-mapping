<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界模型 · 技术全景图谱</title>
<script src="cytoscape.min.js"></script>
<script src="layout-base.js"></script>
<script src="cose-base.js"></script>
<script src="cytoscape-fcose.js"></script>
<script src="graph-data.js"></script>
<style>
  :root {
    --bg: #0c0815;
    --bg-panel: #150f24;
    --border: #251a3a;
    --text: #e2ddf0;
    --text-dim: #7a6f99;
    --accent: #a78bfa;
    --product: #7c3aed;
    --company: #f59e0b;
    --person: #10b981;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh; overflow: hidden; display: flex; flex-direction: column;
    font-size: 12px;
  }

  /* ── Top bar ── */
  .topbar {
    height: 42px; border-bottom: 1px solid var(--border);
    background: rgba(12, 8, 21, 0.9); backdrop-filter: blur(8px);
    display: flex; align-items: center; padding: 0 18px; gap: 18px;
    z-index: 100; flex-shrink: 0;
  }
  .topbar .brand { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .topbar .stats { display: flex; gap: 16px; margin-left: auto; font-size: 10px; color: var(--text-dim); }
  .topbar .stats span { white-space: nowrap; }

  /* ── Main ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px; flex-shrink: 0; border-right: 1px solid var(--border);
    background: var(--bg-panel); display: flex; flex-direction: column;
    overflow-y: auto; overflow-x: hidden; z-index: 50;
  }
  .sidebar-section { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-section:last-child { border-bottom: none; }
  .section-title { font-size: 10px; color: var(--text-dim); margin-bottom: 7px; letter-spacing: 0.5px; }

  /* Search */
  .search-wrap { position: relative; }
  .search-input {
    width: 100%; padding: 6px 28px 6px 10px; font-size: 11px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text); border-radius: 5px; outline: none;
    font-family: inherit; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); font-size: 10px; }
  .search-clear {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    font-size: 14px; padding: 2px; display: none;
  }
  .search-clear.visible { display: block; }
  .search-results { max-height: 220px; overflow-y: auto; margin-top: 4px; }
  .search-result-item {
    padding: 5px 8px; cursor: pointer; border-radius: 4px;
    display: flex; align-items: center; gap: 7px; transition: background 0.12s;
    font-size: 11px;
  }
  .search-result-item:hover { background: rgba(167, 139, 250, 0.1); }
  .search-result-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .search-result-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .search-result-item .sub { color: var(--text-dim); font-size: 9px; flex-shrink: 0; }

  /* Filters */
  .filter-btns { display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-btn {
    padding: 3px 9px; font-size: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; gap: 5px;
    font-family: inherit; transition: all 0.15s;
  }
  .filter-btn.active { color: var(--text); }
  .filter-btn .dot { width: 7px; height: 7px; border-radius: 50%; }
  .filter-btn[data-type="person"].active { border-color: var(--person); }
  .filter-btn[data-type="company"].active { border-color: var(--company); }
  .filter-btn[data-type="product_paper"].active { border-color: var(--product); }

  /* Legend */
  .legend-toggle {
    width: 100%; padding: 7px 0; background: none; border: none;
    color: var(--text-dim); cursor: pointer; font-family: inherit;
    font-size: 10px; text-align: left; display: flex; align-items: center;
    justify-content: space-between;
  }
  .legend-toggle:hover { color: var(--text); }
  .legend-content { display: none; margin-top: 6px; }
  .legend-content.open { display: block; }
  .legend-item {
    display: flex; align-items: center; gap: 7px; padding: 2px 0; font-size: 10px;
  }
  .legend-line { width: 16px; height: 2px; flex-shrink: 0; border-radius: 1px; }

  /* Leaderboard */
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 7px; }
  .tab-btn {
    flex: 1; padding: 5px 2px; font-size: 10px; background: none; border: none;
    border-bottom: 2px solid transparent; color: var(--text-dim); cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .lb-list { flex: 1; overflow-y: auto; }
  .lb-item {
    display: flex; align-items: center; gap: 7px; padding: 4px 6px;
    cursor: pointer; border-radius: 4px; transition: background 0.1s; font-size: 11px;
  }
  .lb-item:hover { background: rgba(167, 139, 250, 0.08); }
  .lb-item .rank { width: 16px; font-size: 10px; color: var(--text-dim); text-align: right; flex-shrink: 0; }
  .lb-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .lb-item .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-item .lb-count { color: var(--text-dim); font-size: 9px; flex-shrink: 0; }

  /* ── Graph container ── */
  .graph-container { flex: 1; position: relative; background: var(--bg); }
  .graph-container .loading {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: var(--text-dim); font-size: 13px;
    z-index: 10; pointer-events: none;
  }
  .graph-container .loading.hidden { display: none; }

  /* Tooltip */
  .tooltip {
    position: absolute; pointer-events: none; z-index: 200;
    background: rgba(21, 15, 36, 0.96); border: 1px solid var(--border);
    padding: 8px 10px; border-radius: 5px; font-size: 10px;
    max-width: 240px; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .tooltip.visible { display: block; }
  .tooltip .tt-name { color: var(--text); font-size: 13px; margin-bottom: 2px; }
  .tooltip .tt-type { color: var(--text-dim); font-size: 10px; }
  .tooltip .tt-desc { color: var(--text-dim); font-size: 10px; margin-top: 4px; line-height: 1.4; }

  /* Detail panel (右侧滑出) */
  .main { position: relative; }
  .detail-panel {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 320px; z-index: 150;
    background: rgba(21, 15, 36, 0.98); border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -4px 0 24px rgba(0,0,0,0.5);
  }
  .detail-panel.open { transform: translateX(0); }
  .detail-header {
    display: flex; align-items: center; padding: 10px 16px;
    border-bottom: 1px solid var(--border); gap: 10px; flex-shrink: 0;
  }
  .detail-header .dh-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .detail-header .dh-name { font-size: 15px; flex: 1; font-weight: 600; }
  .detail-header .dh-type {
    font-size: 10px; color: var(--text-dim); padding: 2px 8px;
    border: 1px solid var(--border); border-radius: 4px;
  }
  .detail-close {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    font-size: 18px; padding: 4px; line-height: 1;
  }
  .detail-close:hover { color: var(--text); }
  .detail-body { padding: 12px 16px; overflow-y: auto; flex: 1; }
  .detail-body .db-desc { color: var(--text-dim); line-height: 1.55; margin-bottom: 14px; font-size: 11px; }
  .detail-body .db-section { margin-bottom: 12px; }
  .detail-body .db-label { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 0.5px; }
  .detail-body .tag {
    display: inline-block; padding: 2px 7px; margin: 2px 3px 2px 0;
    font-size: 9px; background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.2); border-radius: 3px; color: var(--text-dim);
  }
  .detail-body .relation-item {
    display: flex; align-items: center; gap: 7px; padding: 4px 6px;
    font-size: 10px; cursor: pointer; border-radius: 4px; transition: background 0.1s;
  }
  .detail-body .relation-item:hover { background: rgba(167,139,250,0.08); }
  .detail-body .relation-item .rel-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">世界模型 · 技术全景图谱</span>
  <div class="stats">
    <span>566 实体</span>
    <span>1191 关系</span>
    <span>7 关系类型</span>
  </div>
</div>

<div class="main">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-section">
      <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索人物、公司、产品..." autocomplete="off">
        <button class="search-clear" id="searchClear">&times;</button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">类型筛选</div>
      <div class="filter-btns" id="filterBtns">
        <button class="filter-btn active" data-type="person"><span class="dot" style="background:var(--person)"></span>人物</button>
        <button class="filter-btn active" data-type="company"><span class="dot" style="background:var(--company)"></span>公司/机构</button>
        <button class="filter-btn active" data-type="product_paper"><span class="dot" style="background:var(--product)"></span>产品/论文</button>
      </div>
    </div>

    <div class="sidebar-section">
      <button class="legend-toggle" id="legendToggle"><span>图例</span><span id="legendArrow">▶</span></button>
      <div class="legend-content" id="legendContent"></div>
    </div>

    <div class="sidebar-section" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
      <div class="tabs" id="lbTabs">
        <button class="tab-btn active" data-tab="person">人物</button>
        <button class="tab-btn" data-tab="company">公司/机构</button>
        <button class="tab-btn" data-tab="product_paper">产品/论文</button>
      </div>
      <div class="lb-list" id="lbList"></div>
    </div>

  </aside>

  <!-- ═══ GRAPH ═══ -->
  <div class="graph-container" id="graphContainer">
    <div class="loading" id="loading">加载图谱数据...</div>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <!-- ═══ DETAIL PANEL (右侧) ═══ -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <span class="dh-dot" id="dhDot"></span>
      <span class="dh-name" id="dhName"></span>
      <span class="dh-type" id="dhType"></span>
      <button class="detail-close" id="detailClose">&times;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════════════
var TYPE_COLORS = { person: '#10b981', company: '#f59e0b', product_paper: '#7c3aed' };
var TYPE_NAMES = { person: '人物', company: '公司/机构', product_paper: '产品/论文' };

var REL_COLORS = {
  develops: '#6366f1', collaborates: '#3b82f6', related: '#6b7280',
  mentors: '#14b8a6', founded: '#f59e0b', works_at: '#10b981',
  evolves_to: '#ec4899'
};
var REL_NAMES = {
  develops: '开发/推动', collaborates: '合作', related: '关联',
  mentors: '指导', founded: '创办', works_at: '任职',
  evolves_to: '演变'
};

// ═══════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════
var cy = null;
var graphData = null;
var selectedNodeId = null;
var activeFilters = new Set(['person', 'company', 'product_paper']);
var activeTab = 'person';

// ═══════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════
function darken(hex, amt) {
  var num = parseInt(hex.replace('#',''), 16);
  var r = Math.max(0, (num>>16) - amt);
  var g = Math.max(0, ((num>>8)&0xff) - amt);
  var b = Math.max(0, (num&0xff) - amt);
  return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

function nodeRadius(raw) {
  return 14 + 40 * (raw.composite_weight || 0.01);
}

// ═══════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════
function init() {
  if (typeof cytoscapeFcose !== 'undefined' && typeof cytoscape !== 'undefined') {
    cytoscape.use(cytoscapeFcose);
  }

  graphData = window.GRAPH_DATA;
  if (!graphData) {
    document.getElementById('loading').textContent = '数据加载失败';
    return;
  }

  document.getElementById('loading').textContent = '渲染图谱中...';

  // Build elements
  var nodes = graphData.nodes.map(function(n) {
    return {
      data: {
        id: n.id, label: n.name, type: n.type,
        description: n.description || '',
        composite_weight: n.composite_weight || 0,
        degree: n.degree || 0,
        group_id: n.group_id || '',
        group_name: n.group_name || '',
        tags: n.tags || [],
        _raw: n
      }
    };
  });

  var nodeIdSet = new Set(graphData.nodes.map(function(n) { return n.id; }));
  var nameIdMap = {};
  graphData.nodes.forEach(function(n) { nameIdMap[n.name] = n.id; });

  var edges = [];
  for (var i = 0; i < graphData.links.length; i++) {
    var link = graphData.links[i];
    var src = link.source;
    var tgt = link.target;
    if (!nodeIdSet.has(src)) src = nameIdMap[src];
    if (!nodeIdSet.has(tgt)) tgt = nameIdMap[tgt];
    if (!src || !tgt) continue;
    edges.push({
      data: {
        id: src + '__' + link.relation_type + '__' + tgt + '__' + i,
        source: src, target: tgt,
        relation_type: link.relation_type,
        label: link.label || '',
        weight: link.weight || 1
      }
    });
  }

  var container = document.getElementById('graphContainer');

  cy = cytoscape({
    container: container,
    elements: { nodes: nodes, edges: edges },
    style: [
      {
        selector: 'node',
        style: {
          'background-color': function(e) { return TYPE_COLORS[e.data('type')] || '#888'; },
          'border-width': 1.5,
          'border-color': function(e) { return darken(TYPE_COLORS[e.data('type')]||'#888', 40); },
          'width': function(e) { return nodeRadius(e.data('_raw')) * 2; },
          'height': function(e) { return nodeRadius(e.data('_raw')) * 2; },
          'label': '',
          'font-size': 9,
          'color': '#e2ddf0',
          'font-family': '"PingFang SC","Microsoft YaHei",sans-serif',
          'text-outline-width': 2,
          'text-outline-color': '#0c0815',
          'text-max-width': '90px',
          'text-wrap': 'ellipsis',
          'min-zoomed-font-size': 6,
          'overlay-opacity': 0,
        }
      },
      {
        selector: 'node.show-label',
        style: { 'label': 'data(label)' }
      },
      {
        selector: 'node.highlighted',
        style: { 'border-width': 3, 'border-color': '#ffffff', 'z-index': 20 }
      },
      {
        selector: 'node.neighbor',
        style: { 'label': 'data(label)', 'opacity': 1, 'z-index': 15 }
      },
      {
        selector: 'node.dimmed',
        style: { 'opacity': 0.10 }
      },
      {
        selector: 'node.hovered',
        style: { 'label': 'data(label)', 'border-width': 2.5, 'border-color': '#ffffff', 'z-index': 25 }
      },
      {
        selector: 'node.filtered-out',
        style: { 'display': 'none' }
      },
      {
        selector: 'edge',
        style: {
          'width': function(e) { return Math.max(0.6, Math.min(3, Math.log2((e.data('weight')||1)+1))); },
          'line-color': function(e) { return REL_COLORS[e.data('relation_type')] || '#555'; },
          'target-arrow-color': function(e) { return REL_COLORS[e.data('relation_type')] || '#555'; },
          'target-arrow-shape': 'triangle',
          'arrow-scale': 0.7,
          'curve-style': 'bezier',
          'opacity': 0.30,
        }
      },
      {
        selector: 'edge.highlighted',
        style: { 'opacity': 1, 'z-index': 10 }
      },
      {
        selector: 'edge.dimmed',
        style: { 'opacity': 0.04 }
      }
    ],
    minZoom: 0.03,
    maxZoom: 4,
    wheelSensitivity: 0.3,
    pixelRatio: 'auto',
  });

  // Layout
  cy.layout({
    name: 'fcose',
    quality: 'default',
    randomize: true,
    animate: true,
    animationDuration: 1200,
    nodeSeparation: 200,
    idealEdgeLength: function(e) { return 160 + 1 / ((e.data('weight')||1)) * 60; },
    nodeRepulsion: function(e) {
      var d = e.data('degree') || 0;
      return d > 10 ? 30000 : d > 5 ? 18000 : 12000;
    },
    gravity: 0.12,
    gravityRange: 5,
    numIter: 5000,
    nodeDimensionsIncludeLabels: false,
  }).run();

  document.getElementById('loading').classList.add('hidden');

  // Events
  cy.on('zoom', updateLabels);
  cy.on('tap', 'node', function(evt) { selectNode(evt.target.id()); });
  cy.on('tap', function(evt) { if (evt.target === cy) { clearHighlight(); closeDetail(); } });
  cy.on('mouseover', 'node', function(evt) {
    var n = evt.target;
    n.addClass('hovered');
    var p = n.renderedPosition();
    showTooltip(p.x, p.y, n.data('label'), n.data('type'), n.data('description'));
  });
  cy.on('mouseout', 'node', function(evt) {
    evt.target.removeClass('hovered');
    hideTooltip();
  });

  updateLabels();
  renderLegend();
  renderLeaderboard();
  setupSearch();
  setupFilters();
  setupTabs();
  setupDetailClose();
}

// ═══════════════════════════════════════════════════
// Label Visibility
// ═══════════════════════════════════════════════════
function updateLabels() {
  if (!cy) return;
  var zoom = cy.zoom();
  cy.nodes().forEach(function(n) {
    if (n.hasClass('highlighted') || n.hasClass('hovered') || n.hasClass('neighbor')) {
      n.addClass('show-label'); return;
    }
    var d = n.data('degree') || 0;
    if (zoom < 0.35) {
      d > 12 ? n.addClass('show-label') : n.removeClass('show-label');
    } else if (zoom < 0.7) {
      d > 6 ? n.addClass('show-label') : n.removeClass('show-label');
    } else {
      n.addClass('show-label');
    }
  });
}

// ═══════════════════════════════════════════════════
// Selection
// ═══════════════════════════════════════════════════
function selectNode(nodeId) {
  if (!cy) return;
  selectedNodeId = nodeId;
  var node = cy.getElementById(nodeId);
  if (!node.length) return;

  clearHighlight();
  node.addClass('highlighted').addClass('show-label');

  var neighbors = node.neighborhood().nodes();
  neighbors.forEach(function(n) { n.addClass('neighbor').addClass('show-label'); });

  node.connectedEdges().forEach(function(e) { e.addClass('highlighted'); });

  cy.nodes().forEach(function(n) {
    if (!n.hasClass('highlighted') && !n.hasClass('neighbor')) n.addClass('dimmed');
  });
  cy.edges().forEach(function(e) {
    if (!e.hasClass('highlighted')) e.addClass('dimmed');
  });

  cy.animate({
    fit: { eles: node, padding: 180 },
    duration: 500,
    easing: 'ease-in-out-cubic'
  });

  showDetail(node);
}

function clearHighlight() {
  if (!cy) return;
  selectedNodeId = null;
  cy.nodes().forEach(function(n) { n.removeClass('highlighted neighbor dimmed hovered'); });
  cy.edges().forEach(function(e) { e.removeClass('highlighted dimmed'); });
  updateLabels();
}

// ═══════════════════════════════════════════════════
// Tooltip
// ═══════════════════════════════════════════════════
function showTooltip(x, y, name, type, desc) {
  var el = document.getElementById('tooltip');
  var tn = TYPE_NAMES[type] || type;
  var d = desc ? desc.substring(0, 90) + (desc.length > 90 ? '...' : '') : '';
  el.innerHTML = '<div class="tt-name">' + name + '</div><div class="tt-type">' + tn + '</div>' + (d ? '<div class="tt-desc">' + d + '</div>' : '');
  el.classList.add('visible');
  var r = document.getElementById('graphContainer').getBoundingClientRect();
  el.style.left = Math.min(x + 14, r.width - 250) + 'px';
  el.style.top = Math.max(y - 8, 10) + 'px';
}

function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }

// ═══════════════════════════════════════════════════
// Detail Panel
// ═══════════════════════════════════════════════════
function showDetail(node) {
  var d = node.data();
  var raw = d._raw;
  var color = TYPE_COLORS[d.type] || '#888';
  var tn = TYPE_NAMES[d.type] || d.type;

  document.getElementById('dhDot').style.backgroundColor = color;
  document.getElementById('dhName').textContent = d.label;
  document.getElementById('dhType').textContent = tn;

  var body = '';
  if (raw.description) {
    body += '<div class="db-desc">' + escapeHtml(raw.description) + '</div>';
  }

  // Stats
  body += '<div style="display:flex;gap:16px;margin-bottom:12px;font-size:10px;color:var(--text-dim)">';
  body += '<span>度数 ' + (d.degree || 0) + '</span>';
  body += '<span>权重 ' + ((d.composite_weight||0)*100).toFixed(0) + '</span>';
  if (raw.group_name) body += '<span>' + raw.group_name.replace('路线','') + '</span>';
  body += '</div>';

  // Tags
  if (raw.tags && raw.tags.length > 0) {
    body += '<div class="db-section"><div class="db-label">技术路线</div>';
    raw.tags.forEach(function(t) { body += '<span class="tag">' + t + '</span>'; });
    body += '</div>';
  }

  // Relations
  var connEdges = node.connectedEdges();
  if (connEdges.length > 0) {
    body += '<div class="db-section"><div class="db-label">关联关系 (' + connEdges.length + ')</div>';
    var shown = {};
    var order = { mentors:1, founded:2, works_at:3, develops:4, collaborates:5, evolves_to:6, related:7 };
    var sorted = connEdges.sort(function(a, b) {
      return (order[a.data('relation_type')]||5) - (order[b.data('relation_type')]||5);
    });
    sorted.slice(0, 50).forEach(function(edge) {
      var rel = edge.data('relation_type');
      var rn = REL_NAMES[rel] || rel;
      var nid = edge.source().id() === node.id() ? edge.target().id() : edge.source().id();
      var key = nid + '_' + rel;
      if (shown[key]) return;
      shown[key] = true;
      var nb = cy.getElementById(nid);
      if (!nb.length) return;
      var nc = TYPE_COLORS[nb.data('type')] || '#888';
      body += '<div class="relation-item" data-node-id="' + nid + '" onclick="selectNode(\'' + nid + '\')">';
      body += '<span class="rel-dot" style="background:' + nc + '"></span>';
      body += '<span>' + nb.data('label') + '</span>';
      body += '<span style="color:var(--text-dim);margin-left:auto;font-size:9px">' + rn + '</span>';
      body += '</div>';
    });
    body += '</div>';
  }

  document.getElementById('detailBody').innerHTML = body;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedNodeId = null;
}

function setupDetailClose() {
  document.getElementById('detailClose').addEventListener('click', function() {
    closeDetail(); clearHighlight();
  });

  // 阻止详情面板滚轮事件冒泡到图谱（防止缩放）
  var detailBody = document.getElementById('detailBody');
  detailBody.addEventListener('wheel', function(e) {
    e.stopPropagation();
  });
  // 同样阻止详情面板 header 区域的滚轮事件
  var detailHeader = document.querySelector('.detail-header');
  if (detailHeader) {
    detailHeader.addEventListener('wheel', function(e) {
      e.stopPropagation();
    });
  }
}

// ═══════════════════════════════════════════════════
// Search
// ═══════════════════════════════════════════════════
function setupSearch() {
  var input = document.getElementById('searchInput');
  var clearBtn = document.getElementById('searchClear');
  var resultsEl = document.getElementById('searchResults');

  input.addEventListener('input', function() {
    var q = input.value.trim().toLowerCase();
    if (!q) { clearBtn.classList.remove('visible'); resultsEl.innerHTML = ''; return; }
    clearBtn.classList.add('visible');

    var results = graphData.nodes.filter(function(n) {
      return n.name.toLowerCase().indexOf(q) >= 0;
    }).slice(0, 15);

    resultsEl.innerHTML = results.map(function(n) {
      var color = TYPE_COLORS[n.type] || '#888';
      return '<div class="search-result-item" data-node-id="' + n.id + '">'
        + '<span class="dot" style="background:' + color + '"></span>'
        + '<span class="name">' + n.name + '</span>'
        + '<span class="sub">' + (TYPE_NAMES[n.type]||'') + '</span></div>';
    }).join('');

    resultsEl.querySelectorAll('.search-result-item').forEach(function(item) {
      item.addEventListener('click', function() {
        selectNode(item.dataset.nodeId);
        input.value = ''; resultsEl.innerHTML = ''; clearBtn.classList.remove('visible');
      });
    });
  });

  clearBtn.addEventListener('click', function() {
    input.value = ''; resultsEl.innerHTML = ''; clearBtn.classList.remove('visible'); input.focus();
  });
}

// ═══════════════════════════════════════════════════
// Filters
// ═══════════════════════════════════════════════════
function setupFilters() {
  document.getElementById('filterBtns').addEventListener('click', function(e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    var t = btn.dataset.type;
    if (activeFilters.has(t)) { activeFilters.delete(t); btn.classList.remove('active'); }
    else { activeFilters.add(t); btn.classList.add('active'); }
    applyFilters();
  });
}

function applyFilters() {
  if (!cy) return;
  cy.nodes().forEach(function(n) {
    if (activeFilters.has(n.data('type'))) n.removeClass('filtered-out');
    else n.addClass('filtered-out');
  });
  updateLabels();
}

// ═══════════════════════════════════════════════════
// Legend
// ═══════════════════════════════════════════════════
function renderLegend() {
  var content = document.getElementById('legendContent');
  var items = [];
  for (var k in REL_NAMES) { items.push({ key: k, label: REL_NAMES[k] }); }
  content.innerHTML = items.map(function(it) {
    var c = REL_COLORS[it.key] || '#555';
    return '<div class="legend-item"><span class="legend-line" style="background:' + c + '"></span><span>' + it.label + ' (' + it.key + ')</span></div>';
  }).join('');

  document.getElementById('legendToggle').addEventListener('click', function() {
    var el = document.getElementById('legendContent');
    var arrow = document.getElementById('legendArrow');
    el.classList.toggle('open');
    arrow.textContent = el.classList.contains('open') ? '▼' : '▶';
  });
}

// ═══════════════════════════════════════════════════
// Leaderboard
// ═══════════════════════════════════════════════════
function setupTabs() {
  document.getElementById('lbTabs').addEventListener('click', function(e) {
    var btn = e.target.closest('.tab-btn');
    if (!btn) return;
    activeTab = btn.dataset.tab;
    document.querySelectorAll('#lbTabs .tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderLeaderboard();
  });
}

function renderLeaderboard() {
  var list = document.getElementById('lbList');
  var filtered = graphData.nodes.filter(function(n) { return n.type === activeTab; });
  filtered.sort(function(a, b) { return (b.degree||0) - (a.degree||0); });
  var top = filtered;

  list.innerHTML = top.map(function(n, i) {
    var color = TYPE_COLORS[n.type] || '#888';
    return '<div class="lb-item" data-node-id="' + n.id + '">'
      + '<span class="rank">' + (i+1) + '</span>'
      + '<span class="dot" style="background:' + color + '"></span>'
      + '<span class="lb-name">' + n.name + '</span>'
      + '<span class="lb-count">' + (n.degree||0) + '</span></div>';
  }).join('');

  list.querySelectorAll('.lb-item').forEach(function(item) {
    item.addEventListener('click', function() { selectNode(item.dataset.nodeId); });
  });
}

// ═══════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', init);
</script>
